spring.application.name=ai-concierge-service
spring.config.import=optional:file:.env[.properties]

server.port=8094
server.servlet.context-path=/api

spring.data.mongodb.uri=${MONGODB_URI:}
spring.data.mongodb.database=${MONGODB_DATABASE:}

ollama.api.url=${OLLAMA_API_URL:http://localhost:11434/api/chat}
ollama.model=${OLLAMA_MODEL:qwen2.5:7b}

gateway.service.url=${GATEWAY_SERVICE_URL:http://localhost:8080}
booking.service.url=${BOOKING_SERVICE_URL:http://localhost:8083}
room.service.url=${ROOM_SERVICE_URL:http://localhost:8081}

rate.limit.ai.requests-per-minute=20

spring.jackson.mapper.accept-case-insensitive-enums=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.datasource.url=jdbc:mariadb://localhost:3306/ai_concierge
spring.datasource.username=${MARIADB_USER:root}
spring.datasource.password=${MARIADB_PASSWORD:123456789}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=0
spring.data.redis.timeout=2000ms
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=5
spring.data.redis.jedis.pool.max-wait=-1ms

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
eureka.instance.non-secure-port=${server.port}

eureka.client.enabled=true
spring.cloud.discovery.enabled=true